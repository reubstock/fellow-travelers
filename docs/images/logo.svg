<svg viewBox="0 0 100 76" xmlns="http://www.w3.org/2000/svg">

  <!-- ── Train car ── -->
  <rect x="1" y="30" width="52" height="28" rx="2" fill="#c9a84c"/>
  <!-- Horizontal slat lines -->
  <rect x="1" y="38.5" width="52" height="1.5" fill="#0d1117" opacity="0.3"/>
  <rect x="1" y="46.5" width="52" height="1.5" fill="#0d1117" opacity="0.3"/>
  <!-- Wheel -->
  <circle cx="35" cy="58" r="5.5" fill="#0d1117"/>
  <circle cx="35" cy="58" r="3" fill="none" stroke="#c9a84c" stroke-width="1.2"/>

  <!-- Speed lines -->
  <rect x="55" y="32"  width="18" height="1.8" rx="0.9" fill="#c9a84c" opacity="0.5"/>
  <rect x="55" y="37"  width="26" height="2"   rx="1"   fill="#c9a84c" opacity="0.65"/>
  <rect x="55" y="43"  width="30" height="2.2" rx="1.1" fill="#c9a84c" opacity="0.8"/>
  <rect x="55" y="49"  width="26" height="2"   rx="1"   fill="#c9a84c" opacity="0.65"/>
  <rect x="55" y="55"  width="18" height="1.8" rx="0.9" fill="#c9a84c" opacity="0.5"/>

  <!-- ── Figure 1: on train roof, leaning over, reaching down ── -->
  <!-- Hat brim -->
  <ellipse cx="31" cy="11.5" rx="8" ry="2" fill="#c9a84c"/>
  <!-- Hat crown -->
  <path d="M24 12 Q25 4 31 3 Q37 4 38 12 Z" fill="#c9a84c"/>
  <!-- Head -->
  <circle cx="31" cy="16" r="5" fill="#c9a84c"/>
  <!-- Torso leaning right -->
  <path d="M26 21 Q32 22 38 25 Q42 24 42 20 Q38 17 32 17 Q27 18 26 21 Z" fill="#c9a84c"/>
  <!-- Bindle bag on back -->
  <circle cx="21" cy="20" r="4.5" fill="#c9a84c"/>
  <!-- Arm reaching down toward clasped point -->
  <path d="M41 23 Q48 29 53 38" stroke="#c9a84c" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- ── Figure 2: on ground, running, arm up ── -->
  <!-- Hat brim -->
  <ellipse cx="71" cy="33" rx="7" ry="1.8" fill="#c9a84c"/>
  <!-- Hat crown -->
  <path d="M65 33 Q66 26 71 25 Q76 26 77 33 Z" fill="#c9a84c"/>
  <!-- Head -->
  <circle cx="71" cy="37.5" r="4.5" fill="#c9a84c"/>
  <!-- Torso leaning left -->
  <path d="M65 42 Q67 47 71 50 Q75 48 76 44 Q74 39 70 38 Q66 39 65 42 Z" fill="#c9a84c"/>
  <!-- Bindle bag -->
  <circle cx="79" cy="46" r="4" fill="#c9a84c"/>
  <!-- Arm reaching up to clasped point -->
  <path d="M65 43 Q59 41 53 38" stroke="#c9a84c" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Running legs -->
  <path d="M68 50 Q65 58 62 65" stroke="#c9a84c" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M72 50 Q74 57 73 65" stroke="#c9a84c" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- ── Clasped hands ── -->
  <circle cx="53" cy="38" r="3.5" fill="#fff9e6"/>

</svg>
